<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatcherCam</title>
  </head>
  <body>
    <div id="app">
      <section class="intro">
        <div class="header">
          <img src="./appicon.png" alt="" class="logo">
          <div class="title">WatcherCam</div>
        </div>
        <div class="description">
          <p class="tagline">Turn your webcam into a security camera</p>
          <p>
            WatcherCam is a simple and easy to use security camera that uses your webcam to monitor and detect various types of objects of interest.
          </p>
          <p>
            Once detected, send snapshots to any web service you want, or use ours.
          </p>
        </div>
        <div class="ctas">
          <button class="btn-primary">Start monitor</button>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
