<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatcherCam</title>
  </head>
  <body>
    <div id="app" x-data="app">
      <template x-if="monitorStore.monitors.length <= 0">
        <section class="intro">
          <a href="https://github.com/Juicetan/objectcam" class="github-corner" target="_blank" aria-label="View source on Github">
            <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true" style="fill: #aa3bff; color: rgb(255, 255, 255); position: absolute; top: 0px; border: 0px; right: 0px;">
              <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
              <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" class="octo-arm" style="transform-origin: 130px 106px;"></path>
              <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
            </svg>
          </a>
          <div class="header">
            <img src="./appicon.png" alt="" class="logo">
            <div class="title">WatcherCam</div>
          </div>
          <div class="description">
            <p class="tagline">Turn your webcam into a security camera</p>
            <p>
              WatcherCam is a simple and easy to use security camera that uses your webcam to monitor and detect various types of objects of interest.
            </p>
            <p>
              Once detected, send snapshots to any web service you want, or use ours.
            </p>
          </div>
          <div class="ctas">
            <button 
              class="create-monitor-trigger btn primary" 
              @click="comps.cameraPicker.open()"
            >Start monitor</button>
          </div>
        </section>
      </template>
      <template x-if="monitorStore.monitors.length > 0">
        <div class="app-inner">
          <header class="app-header">
            <div class="header-left">
              <img src="./appicon.png" alt="" class="logo"/>
              <div class="header-title">WatcherCam</div>
            </div>
            <div class="header-right">
              <i 
                class="fa fa-share-from-square send-log-trigger"
                :class="{ 'service-set': configStore.isFwdSet() }"
                @click="comps.forwarderConfig.open()"
                title="Configure snapshot forwarding"
              ></i>
              <button class="btn primary" @click="comps.cameraPicker.open()">Start monitor</button>
            </div>
          </header>
          <div class="app-content">
            <section class="monitors">
              <div class="monitor-list">
                <template x-for="monitor in monitorStore.monitors" :key="monitor.id">
                  <div 
                    class="monitor-item app-comp" 
                    :class="{ 'single': monitorStore.monitors.length === 1 }"
                    x-init="monitor.setEl($el)"
                    x-data="monitor"
                  >
                    <div class="window-header">
                      <div class="header-title" x-text="monitor.displayName"></div>
                      <img 
                        src="./close.svg" 
                        alt="Close" 
                        class="close-btn"
                        @click="monitorStore.removeMonitor(monitor)"
                      />                      
                    </div>
                    <div class="window-content">
                      <div class="canvas-wrap">
                        <video class="monitor-feed" autoplay muted playsinline></video>
                      </div>
                      <template x-if="!monitor?.detecting">
                        <div class="loading-indicator">loading...</div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </section>
            <section class="captures-panel">
              <div class="snapshots-header">Captured Snapshots</div>
              <div class="snapshots-list"
                x-ref="snapshotsList"
                x-effect="
                  monitorStore.snapshots.length;
                  $nextTick(() => {
                    const $lastItem = $refs.snapshotsList.lastElementChild;
                    if($lastItem){
                      $lastItem.scrollIntoView({ behavior: 'smooth' });
                    }
                  });
                "
              >
                <template x-for="snapshot in monitorStore.snapshots" :key="snapshot.datetime.getTime()">
                  <div class="snapshot-item">
                    <img :src="snapshot.imgDataURL" alt="" class="snapshot-image"/>
                    <div class="snapshot-meta">
                      <div class="ss-datetime" x-text="snapshot.datetime.toLocaleString()"></div>
                      <div class="ss-objects">
                        <div class="m-name" x-text="snapshot.monitor.name"></div>
                        <div class="p-count">
                          <span x-text="snapshot.predictions.length"></span>
                          <span x-text="snapshot.monitor.objType"></span>
                          <template x-if="snapshot.predictions.length > 1">
                            <span x-if="snapshot.predictions.length > 1">s</span>
                          </template>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </section>
          </div>
        </div>
      </template>
      <dialog 
        class="camera-picker modal-window app-comp" 
        x-data="comps.cameraPicker"
        @camera-selected="fn.handleCameraSelected($event.detail)"
      >
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <div class="header-title">Configure monitor</div>
            <button class="close-btn" @click="close()">
              <img src="./close.svg" alt="Close" class="close-icon" />
            </button>
          </div>
          <div class="modal-body">
            <template x-if="!isLoadingCameras">
              <div class="section-container">
                <div class="section-header field-label">Monitor name:</div>
                <div class="monitor-name">
                  <input type="text" class="monitor-name-input field-input" x-ref="monitorNameInput" x-init="$refs.monitorNameInput.value = 'Monitor ' + utils.guid().slice(0, 4)" />
                </div>
                <div class="section-header field-label">Object to monitor:</div>
                <div class="object-select">
                  <select class="object-selector field-input" x-ref="objectSelector">
                    <template x-for="objectType in objectTypes" :key="objectType">
                      <option :value="objectType" x-text="objectType"></option>
                    </template>
                  </select>
                </div>
                <div class="section-header field-label">Select a camera:</div>
                <div class="camera-list">
                  <template x-for="camera in cameras" :key="camera.deviceId">
                    <div class="camera-item" @click="selectCamera(camera, $refs.objectSelector.value, $refs.monitorNameInput.value)">
                      <div class="camera-name" x-text="camera?.label"></div>
                      <div class="camera-id" x-text="camera?.deviceId.slice(0, 8)"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <template x-if="isLoadingCameras">
              <div class="camera-item loading">
                <div class="camera-name">Loading cameras...</div>
              </div>
            </template>
          </div>
        </div>
      </dialog>
      <dialog 
        class="send-log modal-window app-comp forwarder-config" 
        x-data="comps.forwarderConfig"
      >
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <div class="header-title">Forwarder Configuration</div>
            <button class="close-btn" @click="close()">
              <img src="./close.svg" alt="Close" class="close-icon" />
            </button>
          </div>
          <div class="modal-body">
            <div class="section-description">
              Automatically send captured snapshots to any web service or use the WatcherCam viewer service.
            </div>
            <template x-if="isOpen">
              <div class="section-container form-group">
                <div class="section-header field-label">Choose a service:</div>
                <select 
                  class="forwarder-service-selector field-input"
                  x-model="cfg.serviceType"
                >
                  <option value="watchercam">WatcherCam Viewer</option>
                  <option value="custom">Custom</option>
                </select>
                <template x-if="cfg.serviceType === 'custom'">
                  <div class="service-custom">
                    <div class="section-header field-label">Forwarder URL:</div>
                    <input type="text" class="forwarder-url-input field-input" x-ref="forwarderUrlInput" x-model="cfg.forwarderUrl" />
                    <div class="field-error-info info">Enter the URL of the web service you want to send the captured snapshots to via POST requests.</div>
                  </div>
                </template> 
                <template x-if="cfg.serviceType === 'watchercam'">
                  <div class="service-watchercam">
                    <div class="section-header field-label">Choose a storage key:</div>
                    <input 
                      type="text"
                      class="watchercam-viewer-url-input field-input" x-ref="watchercamViewerUrlInput" 
                      placeholder="Choose a storage key (eg. ENJ434)"
                      x-model="cfg.storageKey"
                    />
                    <div class="field-error-info info">Use your storage key to remotely view your captured snapshots in the WatcherCam viewer. <a href="https://watchercam.com/viewer" target="_blank">https://watchercam.com/viewer</a></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
          <div class="modal-footer">
            <button class="btn secondary" @click="close()">Cancel</button>
            <button class="btn primary" @click="save()">Save</button>
          </div>
        </div>
      </dialog>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
